name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: team_nhrO7JzbHGurnci9MMIogeL1
          vercel-project-id: prj_Dhdvoyig30jGeajdtxyf8dhFluHK
          vercel-args: '--prod'
          working-directory: ./
